name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  frontend-backend:
    name: Lint, Typecheck, Test, Build (web + api)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Backend tests
        run: npm run test --workspace=apps/api

      - name: Frontend tests
        run: npm run test --workspace=apps/web

      - name: Build shared package
        run: npm run build --workspace=packages/shared

      - name: Build backend
        run: npm run build --workspace=apps/api

      - name: Build frontend
        run: npm run build --workspace=apps/web

  contract:
    name: Soroban contract tests + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown
          override: true

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/credential_registry/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/credential_registry/Cargo.lock') }}

      - name: Run contract tests
        working-directory: contracts/credential_registry
        run: cargo test

      - name: Install cargo-binstall
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: Install Stellar CLI
        run: cargo binstall --no-confirm stellar-cli

      - name: Build contracts
        working-directory: contracts/credential_registry
        run: |
          cargo build --target wasm32-unknown-unknown --release
          stellar contract optimize --wasm target/wasm32-unknown-unknown/release/credential_registry.wasm

      - name: Deploy to Testnet
        working-directory: contracts/credential_registry
        run: |
          echo "Generating identities..."
          stellar network add --global testnet --rpc-url https://soroban-testnet.stellar.org:443 --network-passphrase "Test SDF Network ; September 2015"
          stellar keys generate deployer --network testnet
          stellar keys fund deployer --network testnet

          echo "Deploying Contract..."
          CONTRACT_ID=$(stellar contract deploy \
            --wasm target/wasm32-unknown-unknown/release/credential_registry.optimized.wasm \
            --source deployer \
            --network testnet 2>deploy_err.log) || { cat deploy_err.log; exit 1; }
          echo "========================================================"
          echo "Contract deployed at: $CONTRACT_ID"
          
          echo "Fetching Test Token (Native XLM asset) ID..."
          TOKEN_ID=$(stellar contract id asset --asset native --network testnet)
          echo "Native Token ID is: $TOKEN_ID"
          echo "========================================================"
