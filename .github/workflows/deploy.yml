name: Deploy Contracts to Testnet

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  deploy:
    name: Deploy to Testnet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry and binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            target
          key: ${{ runner.os }}-cargo-deploy-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-binstall
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: Install Stellar CLI
        run: cargo binstall --no-confirm stellar-cli

      - name: Build contracts
        working-directory: contracts/credential_registry
        run: |
          cargo build --target wasm32-unknown-unknown --release
          stellar contract optimize --wasm target/wasm32-unknown-unknown/release/credential_registry.wasm

      - name: Deploy to Testnet
        working-directory: contracts/credential_registry
        run: |
          echo "Generating identities..."
          stellar keys generate deployer --network testnet
          stellar keys fund deployer --network testnet

          echo "Deploying Contract..."
          CONTRACT_ID=$(stellar contract deploy \
            --wasm target/wasm32-unknown-unknown/release/credential_registry.optimized.wasm \
            --source deployer \
            --network testnet 2>deploy_err.log) || { cat deploy_err.log; exit 1; }
          echo "========================================================"
          echo "Contract deployed at: $CONTRACT_ID"
          
          echo "Fetching Test Token (Native XLM asset) ID..."
          TOKEN_ID=$(stellar contract id asset --asset native --network testnet)
          echo "Native Token ID is: $TOKEN_ID"
          echo "========================================================"
